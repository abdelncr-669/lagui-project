<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAGUI | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center p-6 border-b border-gray-800 sticky top-0 bg-black z-50">
        <h1 class="text-2xl font-bold tracking-widest">LAGUI</h1>
        <div class="space-x-8 text-sm uppercase tracking-widest">
            <a href="#" class="hover:text-gray-400">Collections</a>
            <a href="#" class="hover:text-gray-400">À propos</a>
            <a href="#" class="border px-4 py-2 hover:bg-white hover:text-black transition">Panier (0)</a>
        </div>
    </nav>

    <section class="h-[80vh] flex flex-col justify-center items-center text-center bg-zinc-900 mb-12">
        <h2 class="text-6xl font-bold mb-4 uppercase tracking-tighter">Essentiels Urbains</h2>
        <p class="text-gray-400 text-lg mb-8">La collection capsule est maintenant disponible.</p>
        <a href="#shop" class="bg-white text-black px-8 py-3 font-bold uppercase text-sm hover:bg-gray-200 transition">Découvrir</a>
    </section>

    <main id="shop" class="max-w-7xl mx-auto px-6 py-12">
        <h3 class="text-xl mb-8 uppercase tracking-widest border-b border-gray-800 pb-4">Tous les articles (20)</h3>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="product-card group cursor-pointer">
                <div class="aspect-[3/4] bg-zinc-800 overflow-hidden mb-4">
                    <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&q=80&w=600" alt="Hoodie" class="w-full h-full object-cover transition duration-500">
                </div>
                <h4 class="font-bold">Hoodie Signature Noir</h4>
                <p class="text-gray-500 text-sm">110,00 €</p>
                <button class="mt-4 w-full bg-white text-black py-2 text-xs font-bold uppercase opacity-0 group-hover:opacity-100 transition">Ajouter au panier</button>
            </div>

            <div class="product-card group cursor-pointer">
                <div class="aspect-[3/4] bg-zinc-800 overflow-hidden mb-4">
                    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&q=80&w=600" alt="T-shirt" class="w-full h-full object-cover transition duration-500">
                </div>
                <h4 class="font-bold">T-shirt Premium Blanc</h4>
                <p class="text-gray-500 text-sm">45,00 €</p>
                <button class="mt-4 w-full bg-white text-black py-2 text-xs font-bold uppercase opacity-0 group-hover:opacity-100 transition">Ajouter au panier</button>
            </div>
            
            </div>
    </main>

    <footer class="p-12 border-t border-gray-800 mt-20 text-center text-gray-600 text-xs">
        <p>© 2026 LAGUI OFFICIAL STORE. TOUS DROITS RÉSERVÉS.</p>
    </footer>

</body>
</html>
