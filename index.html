<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAGUI | Official Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #fff; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
        .active { display: flex !important; }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center p-6 border-b border-zinc-800 sticky top-0 bg-black/80 backdrop-blur-md z-50">
        <h1 class="text-2xl font-bold tracking-[0.3em] cursor-pointer" onclick="showPage('home')">LAGUI</h1>
        <div class="flex items-center space-x-8 uppercase text-xs tracking-widest">
            <button onclick="showPage('shop')" class="hover:text-zinc-400">Shop</button>
            <button onclick="toggleCart()" class="bg-white text-black px-4 py-2 font-bold hover:bg-zinc-200 transition">
                Panier (<span id="cart-count">0</span>)
            </button>
        </div>
    </nav>

    <section id="home-page" class="h-[70vh] flex flex-col justify-center items-center text-center">
        <h2 class="text-7xl font-bold mb-6 tracking-tighter">LAGUI COLLECTION</h2>
        <button onclick="showPage('shop')" class="border border-white px-10 py-4 hover:bg-white hover:text-black transition uppercase text-sm font-bold">
            Entrer dans la boutique
        </button>
    </section>

    <section id="shop-page" class="hidden max-w-7xl mx-auto px-6 py-12">
        <div class="flex justify-between items-end mb-12 border-b border-zinc-800 pb-6">
            <h2 class="text-3xl font-light">ARTICLES <span class="text-zinc-500 text-sm">(10)</span></h2>
        </div>
        
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-8">
            </div>
    </section>

    <div id="product-modal" class="modal items-center justify-center p-4">
        <div class="bg-zinc-900 max-w-4xl w-full flex flex-col md:flex-row overflow-hidden relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl">&times;</button>
            <div class="md:w-1/2 h-[500px]">
                <img id="modal-img" src="" class="w-full h-full object-cover">
            </div>
            <div class="md:w-1/2 p-10 flex flex-col justify-center">
                <h2 id="modal-title" class="text-3xl font-bold mb-4 italic uppercase"></h2>
                <p id="modal-price" class="text-xl text-zinc-400 mb-6"></p>
                <p id="modal-desc" class="text-zinc-500 leading-relaxed mb-8"></p>
                <button id="add-to-cart-btn" class="bg-white text-black py-4 font-bold uppercase hover:bg-zinc-200 transition">
                    Ajouter au panier
                </button>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-full md:w-96 bg-zinc-950 z-[110] border-l border-zinc-800 transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-6 border-b border-zinc-800 flex justify-between items-center">
            <h2 class="text-xl font-bold uppercase tracking-widest">Ton Panier</h2>
            <button onclick="toggleCart()" class="text-2xl">&times;</button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto p-6 space-y-4">
            </div>
        <div class="p-6 border-t border-zinc-800 bg-zinc-900">
            <div class="flex justify-between text-xl font-bold mb-6">
                <span>Total</span>
                <span id="cart-total">0,00 €</span>
            </div>
            <button onclick="alert('Redirection vers Stripe...')" class="w-full bg-white text-black py-4 font-bold uppercase hover:bg-zinc-300">
                Passer à l'achat
            </button>
        </div>
    </div>

    <script>
        // DONNÉES DES ARTICLES
        const products = [
            // PULLS
            { id: 1, name: "Pull Oversize Ash", price: 85, category: "Pulls", img: "https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?q=80&w=600", desc: "Coupe large, coton lourd 450g. Parfait pour un look minimaliste." },
            { id: 2, name: "Pull Col Roulé Noir", price: 95, category: "Pulls", img: "https://images.unsplash.com/photo-1516762689617-e1cffcef479d?q=80&w=600", desc: "Laine mérinos ultra douce. L'élégance Lagui au quotidien." },
            { id: 3, name: "Sweat à Capuche Sand", price: 110, category: "Pulls", img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=600", desc: "Le hoodie signature. Texture premium, poche kangourou invisible." },
            { id: 4, name: "Knit Beige", price: 120, category: "Pulls", img: "https://images.unsplash.com/photo-1574167132757-1247a11d213e?q=80&w=600", desc: "Maille épaisse travaillée. Un classique de la marque." },
            { id: 5, name: "Crewneck Graphite", price: 75, category: "Pulls", img: "https://images.unsplash.com/photo-1554568218-0f1715e72254?q=80&w=600", desc: "Coupe droite, intérieur polaire pour un confort thermique optimal." },
            // JEANS
            { id: 6, name: "Jean Baggy Raw", price: 140, category: "Jeans", img: "https://images.unsplash.com/photo-1541099649105-f69ad21f3246?q=80&w=600", desc: "Denim japonais rigide. Se patine avec le temps." },
            { id: 7, name: "Jean Slim Black", price: 115, category: "Jeans", img: "https://images.unsplash.com/photo-1542272604-787c3835535d?q=80&w=600", desc: "Jean ajusté avec 2% d'élasthanne pour la liberté de mouvement." },
            { id: 8, name: "Carpenter Denim Blue", price: 155, category: "Jeans", img: "https://images.unsplash.com/photo-1582552938357-32b906df40cb?q=80&w=600", desc: "Multi-poches style ouvrier, coupe droite moderne." },
            { id: 9, name: "Loose Fit Grey", price: 130, category: "Jeans", img: "https://images.unsplash.com/photo-1604176354204-9268737828e4?q=80&w=600", desc: "Teinte gris délavé, tombé parfait sur les sneakers." },
            { id: 10, name: "Jean Cargo Shadow", price: 160, category: "Jeans", img: "https://images.unsplash.com/photo-1565084888279-aff9969671fb?q=80&w=600", desc: "Fusion entre un pantalon cargo et un jean. Pièce technique." }
        ];

        let cart = [];

        // NAVIGATION ENTRE LES PAGES
        function showPage(pageId) {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('shop-page').classList.add('hidden');
            document.getElementById(pageId + '-page').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        // GÉNÉRER LA GRILLE PRODUITS
        const grid = document.getElementById('product-grid');
        products.forEach(p => {
            const div = document.createElement('div');
            div.className = "group cursor-pointer";
            div.onclick = () => openProduct(p);
            div.innerHTML = `
                <div class="aspect-[3/4] bg-zinc-900 overflow-hidden mb-4 relative">
                    <img src="${p.img}" class="w-full h-full object-cover transition duration-700 group-hover:scale-110">
                    <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition flex items-center justify-center">
                        <span class="text-white text-xs tracking-widest font-bold border border-white p-2">VOIR DÉTAILS</span>
                    </div>
                </div>
                <h3 class="text-sm font-bold uppercase tracking-wider">${p.name}</h3>
                <p class="text-zinc-500 text-sm">${p.price},00 €</p>
            `;
            grid.appendChild(div);
        });

        // MODAL PRODUIT
        function openProduct(p) {
            document.getElementById('modal-img').src = p.img;
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-price').innerText = p.price + ",00 €";
            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('add-to-cart-btn').onclick = () => { addToCart(p); closeModal(); };
            document.getElementById('product-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('product-modal').classList.remove('active');
        }

        // PANIER
        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            sidebar.classList.toggle('translate-x-full');
        }

        function addToCart(p) {
            cart.push(p);
            updateCart();
            toggleCart();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            const container = document.getElementById('cart-items');
            const count = document.getElementById('cart-count');
            const total = document.getElementById('cart-total');
            
            container.innerHTML = "";
            let sum = 0;

            cart.forEach((item, index) => {
                sum += item.price;
                const div = document.createElement('div');
                div.className = "flex space-x-4 bg-zinc-900 p-2 items-center";
                div.innerHTML = `
                    <img src="${item.img}" class="w-16 h-16 object-cover">
                    <div class="flex-grow">
                        <h4 class="text-xs font-bold uppercase">${item.name}</h4>
                        <p class="text-xs text-zinc-500">${item.price} €</p>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-zinc-500 hover:text-white">&times;</button>
                `;
                container.appendChild(div);
            });

            count.innerText = cart.length;
            total.innerText = sum + ",00 €";
        }
    </script>
</body>
</html>
